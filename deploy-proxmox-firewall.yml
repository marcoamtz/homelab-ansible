---
- name: Deploy Proxmox Firewall Configuration
  hosts: proxmox_hosts
  become: yes

  tasks:
    # pmxcfs (/etc/pve) does not support atomic file replacements. Ansible's
    # template module fails on new files because it cannot rename temp files.
    # Pre-create empty files so template only needs to overwrite in place.
    - name: Ensure firewall config files exist
      command: touch {{ item }}
      args:
        creates: "{{ item }}"
      loop:
        - /etc/pve/firewall/cluster.fw
        - "/etc/pve/firewall/{{ dns_ctid }}.fw"
        - "/etc/pve/firewall/{{ tailscale_ctid }}.fw"
        - "/etc/pve/firewall/{{ docker_ctid }}.fw"

    - name: Deploy cluster firewall config
      template:
        src: proxmox/firewall/cluster.fw.j2
        dest: /etc/pve/firewall/cluster.fw
        owner: root
        group: www-data
        mode: "0640"

    - name: Deploy DNS container firewall config
      template:
        src: proxmox/firewall/ct-dns.fw.j2
        dest: "/etc/pve/firewall/{{ dns_ctid }}.fw"
        owner: root
        group: www-data
        mode: "0640"

    - name: Deploy Tailscale container firewall config
      template:
        src: proxmox/firewall/ct-tailscale.fw.j2
        dest: "/etc/pve/firewall/{{ tailscale_ctid }}.fw"
        owner: root
        group: www-data
        mode: "0640"

    - name: Deploy Docker container firewall config
      template:
        src: proxmox/firewall/ct-docker.fw.j2
        dest: "/etc/pve/firewall/{{ docker_ctid }}.fw"
        owner: root
        group: www-data
        mode: "0640"
