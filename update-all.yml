- name: Update all LXC containers
  hosts: dns_servers,tailscale_nodes,docker_hosts
  become: yes

  tasks:
    - name: Update and upgrade packages
      apt:
        update_cache: yes
        upgrade: dist
      register: apt_result

    - name: Show upgraded packages
      debug:
        msg: "{{ apt_result.stdout_lines | default([]) }}"
      when: apt_result.changed
