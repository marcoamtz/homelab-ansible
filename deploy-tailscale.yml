---
- name: Deploy Tailscale Bridge (LXC Optimized)
  hosts: tailscale_nodes
  become: yes

  tasks:
    - name: Install system requirements
      apt:
        name: [curl, gnupg, locales, ca-certificates, ndisc6]
        state: present
        update_cache: yes

    - name: Enable en_US.UTF-8 locale
      lineinfile:
        path: /etc/locale.gen
        regexp: '^# en_US.UTF-8 UTF-8'
        line: 'en_US.UTF-8 UTF-8'
      register: locale_gen_result

    - name: Generate locales
      command: locale-gen
      when: locale_gen_result.changed

    # WARNING: Pipes a remote script to shell as root. This is Tailscale's official
    # install method, but carries inherent supply-chain risk.
    - name: Bootstrap Tailscale CLI
      shell: "curl -fsSL https://tailscale.com/install.sh | sh"
      args:
        creates: /usr/bin/tailscale

    # Use a sysctl.d drop-in instead of /etc/sysctl.conf to avoid overwriting
    # unrelated kernel tunables. The sysctl module's reload can silently fail
    # inside Proxmox LXC containers, so we apply via handler.
    - name: Deploy sysctl configuration
      copy:
        content: |
          net.ipv4.ip_forward=1
          net.ipv6.conf.all.forwarding=1
          net.ipv6.conf.all.accept_ra=2
          net.ipv6.conf.eth0.accept_ra=2
        dest: /etc/sysctl.d/99-tailscale.conf
        owner: root
        group: root
        mode: "0644"
      notify: Apply sysctl settings

    # Ensure forwarding survives container restarts — LXC does not reliably
    # run sysctl.conf at boot.
    - name: Apply IP forwarding on boot
      cron:
        name: "sysctl-forwarding"
        special_time: reboot
        job: "/sbin/sysctl -p /etc/sysctl.d/99-tailscale.conf && /usr/bin/rdisc6 -1 eth0"

    # Proxmox ip6=auto handles GUA via SLAAC; add static ULA here so both coexist.
    - name: Assign static ULA address
      command: ip -6 addr add {{ ula_address }} dev eth0
      register: ula_result
      changed_when: >
        ula_result.rc == 0 and
        'RTNETLINK answers: File exists' not in ula_result.stderr and
        'address already assigned' not in ula_result.stderr
      failed_when: >
        ula_result.rc != 0 and
        'RTNETLINK answers: File exists' not in ula_result.stderr and
        'address already assigned' not in ula_result.stderr

    - name: Check Tailscale status
      command: tailscale status
      register: ts_status
      changed_when: false
      failed_when: false

    - name: Authenticate and start Tailscale
      command: >
        tailscale up
        --authkey={{ tailscale_auth_key }}
        {{ tailscale_args }}
      register: ts_up
      changed_when: ts_status.rc != 0
      no_log: true

    # Use systemctl directly — the Ansible systemd module fails to enumerate
    # services inside Proxmox LXC containers.
    - name: Enable and start Tailscale
      command: systemctl enable --now tailscaled
      register: service_result
      changed_when: "'Created symlink' in service_result.stderr"

    - name: Verify Tailscale is online
      command: tailscale ip -4
      register: ts_ip
      changed_when: false
      failed_when: ts_ip.rc != 0

  handlers:
    - name: Apply sysctl settings
      command: sysctl -p /etc/sysctl.d/99-tailscale.conf
      changed_when: false
